<div id="folderBrowserModal" class="folder-browser-modal" hidden>
  <div class="folder-browser-backdrop" data-folder-close></div>
  <div class="folder-browser-panel">
    <div class="folder-browser-header">
      <h3>Browse Folder</h3>
      <button type="button" class="btn-secondary" data-folder-close>Close</button>
    </div>
    <div class="folder-browser-path">
      <input id="folderBrowserPath" class="input" value="/app/kernel">
      <button id="folderBrowserGo" type="button" class="btn-secondary">Go</button>
    </div>
    <div id="folderBrowserRoots" class="attach-pills"></div>
    <div id="folderBrowserEntries" class="folder-browser-entries"></div>
    <div id="folderBrowserStatus" class="small-muted"></div>
    <div class="folder-browser-actions">
      <button id="folderBrowserSelect" type="button" class="btn-primary">Select This Folder</button>
    </div>
  </div>
</div>
