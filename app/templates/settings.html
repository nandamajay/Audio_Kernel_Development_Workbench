{% extends "base.html" %}
{% block title %}Settings{% endblock %}

{% block head %}
<style>
  .settings-shell {
    min-height: calc(100vh - 160px);
    display: grid;
    place-items: center;
    padding: 20px;
  }

  .settings-card {
    width: min(720px, 98%);
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    padding: 40px;
    display: grid;
    gap: 10px;
  }

  .settings-card h2 {
    margin: 0 0 8px;
  }

  .settings-card .input {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text-primary);
  }

  .settings-card .input:focus {
    border-color: var(--accent-blue);
    outline: none;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
  }

  .settings-save {
    background: var(--gradient-hero);
    color: #fff;
    border: none;
    padding: 10px 28px;
    border-radius: var(--radius-btn);
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
  }

  .settings-save:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .settings-status {
    min-height: 22px;
    font-size: 13px;
  }

  .settings-status.ok,
  .settings-status.err {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 6px 12px;
    width: fit-content;
  }

  .settings-status.ok {
    background: rgba(16, 185, 129, 0.15);
    border: 1px solid rgba(16, 185, 129, 0.45);
    color: #b8f7df;
  }

  .settings-status.err {
    background: rgba(239, 68, 68, 0.14);
    border: 1px solid rgba(239, 68, 68, 0.45);
    color: #fecaca;
  }

  .extra-path-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }

  .extra-path-list {
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 10px;
    display: grid;
    gap: 6px;
    min-height: 44px;
  }

  .extra-path-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-size: 12px;
    padding: 6px 8px;
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.02);
  }

  .setting-group {
    display: grid;
    gap: 8px;
    margin-top: 2px;
  }

  .email-chips-container {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 36px;
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 8px;
    background: rgba(255, 255, 255, 0.02);
  }

  .email-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--glass-border);
    border-radius: 999px;
    padding: 4px 8px;
    font-size: 12px;
    background: rgba(59, 130, 246, 0.16);
  }

  .email-chip button {
    border: none;
    background: transparent;
    color: inherit;
    cursor: pointer;
    padding: 0;
    line-height: 1;
  }

  .email-add-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }
</style>
{% endblock %}

{% block content %}
<div class="settings-shell">
  <div class="settings-card">
    <h2>Settings</h2>

    <label>Display Name</label>
    <input id="displayName" class="input" value="{{ values.get('USER_DISPLAY_NAME', '') }}">

    <label>User Email</label>
    <input id="userEmail" class="input" type="email" value="{{ values.get('USER_EMAIL', '') }}" placeholder="you@example.com">

    <label>QGenie API Key</label>
    <input id="apiKey" class="input" type="password" placeholder="Leave blank to keep existing">

    <label>Provider URL</label>
    <input id="providerUrl" class="input" value="{{ values.get('QGENIE_PROVIDER_URL', '') }}">

    <label>SSL Verify</label>
    <select id="sslVerify" class="input" data-testid="ssl-verify-field">
      <option value="true" {% if values.get('QGENIE_SSL_VERIFY', 'true') == 'true' %}selected{% endif %}>true (recommended)</option>
      <option value="false" {% if values.get('QGENIE_SSL_VERIFY', 'true') == 'false' %}selected{% endif %}>false (temporary workaround)</option>
    </select>

    <label>CA Bundle Path (optional)</label>
    <input id="caBundle" class="input" data-testid="ca-bundle-field" value="{{ values.get('QGENIE_CA_BUNDLE', '') }}" placeholder="/app/certs/qcom-ca-chain.crt">

    <label>Default Model</label>
    <select id="defaultModel" class="input">
      {% for model in models %}
      <option value="{{ model }}" {% if selected_model == model %}selected{% endif %}>{{ model }} {{ model_metadata.get(model, {}).get('badge', '') }}</option>
      {% endfor %}
      <option value="auto" {% if selected_model == 'auto' %}selected{% endif %}>auto</option>
    </select>

    <label>Kernel Source Path</label>
    <input id="kernelSrcPath" class="input" value="{{ values.get('KERNEL_SRC_PATH', '/app/kernel') }}">
    <div id="checkpatchPathStatus" class="small-muted"></div>

    <label>Extra Workspace Paths</label>
    <div class="extra-path-row">
      <input id="extraPathInput" class="input" placeholder="/local/mnt/workspace/my_driver">
      <button id="addExtraPathBtn" class="btn-secondary" type="button">+ Add</button>
    </div>
    <div id="extraPathList" class="extra-path-list"></div>

    <div class="setting-group">
      <label>📧 Tracked Email IDs (for Upstream Tracker)</label>
      <div class="email-chips-container" id="emailChipsContainer"></div>
      <div class="email-add-row">
        <input type="email" id="newTrackedEmail" class="input" placeholder="e.g. nandam@qti.qualcomm.com">
        <button id="addTrackedEmailBtn" class="btn-secondary" type="button">+ Add</button>
      </div>
      <small class="small-muted">Primary email is always included in Upstream Tracker.</small>
    </div>

    <label>SMTP Host</label>
    <input id="smtpHost" class="input" value="{{ values.get('SMTP_HOST', 'localhost') }}">

    <label>SMTP Port</label>
    <input id="smtpPort" class="input" type="number" value="{{ values.get('SMTP_PORT', '25') }}">

    <label>SMTP From</label>
    <input id="smtpFrom" class="input" value="{{ values.get('AKDW_EMAIL_FROM', 'nandam@qti.qualcomm.com') }}">

    <label>Session Retention Days</label>
    <input id="sessionRetentionDays" class="input" type="number" value="{{ values.get('SESSION_RETENTION_DAYS', '30') }}">

    <label>Agent Thinking Visible</label>
    <select id="agentShowThinking" class="input">
      <option value="true" {% if values.get('AGENT_SHOW_THINKING', 'true') == 'true' %}selected{% endif %}>true</option>
      <option value="false" {% if values.get('AGENT_SHOW_THINKING', 'true') == 'false' %}selected{% endif %}>false</option>
    </select>

    <label>Max Token Warning %</label>
    <input id="tokenWarnThreshold" class="input" type="number" min="1" max="100" value="{{ values.get('TOKEN_WARN_THRESHOLD', '75') }}">

    <div class="setup-actions">
      <a class="btn-secondary" href="{{ url_for('dashboard.setup_page') }}">Open Setup Wizard</a>
      <button id="saveBtn" class="settings-save" type="button">Save Settings</button>
    </div>
    <p id="setupStatus" class="settings-status"></p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  const statusEl = document.getElementById('setupStatus');
  const extraListEl = document.getElementById('extraPathList');
  const extraPaths = {{ extra_paths | tojson }};
  let trackedEmails = [];

  function setStatus(ok, message) {
    statusEl.className = 'settings-status ' + (ok ? 'ok' : 'err');
    statusEl.textContent = (ok ? '✅ ' : '❌ ') + (message || '');
  }

  function renderExtraPaths() {
    extraListEl.innerHTML = '';
    if (!extraPaths.length) {
      extraListEl.innerHTML = '<div class="small-muted">No extra workspace paths configured.</div>';
      return;
    }
    extraPaths.forEach(function (path, idx) {
      const row = document.createElement('div');
      row.className = 'extra-path-item';
      row.innerHTML = '<span>✓ ' + path + '</span>';
      const rm = document.createElement('button');
      rm.type = 'button';
      rm.className = 'btn-secondary';
      rm.textContent = 'Remove';
      rm.addEventListener('click', function () {
        extraPaths.splice(idx, 1);
        renderExtraPaths();
      });
      row.appendChild(rm);
      extraListEl.appendChild(row);
    });
  }

  function renderTrackedEmails() {
    const chips = document.getElementById('emailChipsContainer');
    chips.innerHTML = '';
    if (!trackedEmails.length) {
      chips.innerHTML = '<span class="small-muted">No tracked emails yet.</span>';
      return;
    }
    trackedEmails.forEach(function (email) {
      const chip = document.createElement('span');
      chip.className = 'email-chip';
      chip.innerHTML = '<span>' + email + '</span>';
      const rm = document.createElement('button');
      rm.type = 'button';
      rm.textContent = '✕';
      rm.addEventListener('click', function () {
        removeTrackedEmail(email);
      });
      chip.appendChild(rm);
      chips.appendChild(chip);
    });
  }

  async function validateCheckpatchPath() {
    const statusEl = document.getElementById('checkpatchPathStatus');
    if (!statusEl) return;
    const path = document.getElementById('kernelSrcPath').value.trim();
    statusEl.textContent = 'Checking checkpatch.pl...';
    try {
      const res = await fetch('/api/validate_checkpatch?path=' + encodeURIComponent(path));
      const data = await res.json();
      if (data.found) {
        statusEl.textContent = '✅ checkpatch.pl found at ' + (data.path || (path + '/scripts/checkpatch.pl'));
      } else {
        statusEl.textContent = '⚠️ checkpatch.pl not found. Configure Kernel Source Path.';
      }
    } catch (err) {
      statusEl.textContent = '⚠️ Unable to validate checkpatch.pl';
    }
  }

  async function loadTrackedEmails() {
    try {
      const res = await fetch('/api/upstream/emails');
      const data = await res.json();
      trackedEmails = Array.isArray(data.emails) ? data.emails : [];
      renderTrackedEmails();
    } catch (err) {
      trackedEmails = [];
      renderTrackedEmails();
    }
  }

  async function loadSettingsFromApi() {
    try {
      const res = await fetch('/api/settings');
      if (!res.ok) return;
      const data = await res.json();
      document.getElementById('sslVerify').value = data.qgenie_ssl_verify || 'true';
      document.getElementById('caBundle').value = data.qgenie_ca_bundle || '';
    } catch (err) {
      // ignore api preload failures
    }
  }

  async function addTrackedEmail() {
    const input = document.getElementById('newTrackedEmail');
    const email = (input.value || '').trim();
    if (!email) return;
    const res = await fetch('/api/upstream/emails', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email }),
    });
    const data = await res.json();
    if (!res.ok) {
      setStatus(false, data.error || 'Failed to add email');
      return;
    }
    trackedEmails = Array.isArray(data.emails) ? data.emails : trackedEmails;
    input.value = '';
    renderTrackedEmails();
  }

  async function removeTrackedEmail(email) {
    const res = await fetch('/api/upstream/emails', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email }),
    });
    const data = await res.json();
    if (!res.ok) {
      setStatus(false, data.error || 'Failed to remove email');
      return;
    }
    trackedEmails = Array.isArray(data.emails) ? data.emails : trackedEmails;
    renderTrackedEmails();
  }

  document.getElementById('addExtraPathBtn').addEventListener('click', async function () {
    const input = document.getElementById('extraPathInput');
    const hostPath = input.value.trim();
    if (!hostPath) return;
    const resp = await fetch('/api/editor/mount_path', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ host_path: hostPath }),
    });
    const data = await resp.json();
    if (!data.ok) {
      setStatus(false, data.error || 'Failed to mount path');
      return;
    }
    if (!extraPaths.includes(data.mount_alias)) {
      extraPaths.push(data.mount_alias);
    }
    input.value = '';
    renderExtraPaths();
    setStatus(true, 'Mounted: ' + data.mount_alias);
  });

  document.getElementById('saveBtn').addEventListener('click', async function () {
    const payload = {
      user_display_name: document.getElementById('displayName').value,
      user_email: document.getElementById('userEmail').value,
      api_key: document.getElementById('apiKey').value,
      provider_url: document.getElementById('providerUrl').value,
      ssl_verify: document.getElementById('sslVerify').value,
      ca_bundle: document.getElementById('caBundle').value,
      default_model: document.getElementById('defaultModel').value,
      kernel_src_path: document.getElementById('kernelSrcPath').value,
      extra_workspace_paths: extraPaths,
      upstream_tracked_emails: JSON.stringify(trackedEmails),
      smtp_host: document.getElementById('smtpHost').value,
      smtp_port: document.getElementById('smtpPort').value,
      smtp_from: document.getElementById('smtpFrom').value,
      session_retention_days: document.getElementById('sessionRetentionDays').value,
      agent_show_thinking: document.getElementById('agentShowThinking').value,
      token_warn_threshold: document.getElementById('tokenWarnThreshold').value,
    };
    const resp = await fetch('/api/settings/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    setStatus(!!data.ok, data.message || 'Settings updated');
    validateCheckpatchPath();
  });

  document.getElementById('addTrackedEmailBtn').addEventListener('click', addTrackedEmail);
  document.getElementById('newTrackedEmail').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      addTrackedEmail();
    }
  });

  document.getElementById('kernelSrcPath').addEventListener('blur', validateCheckpatchPath);

  renderExtraPaths();
  loadTrackedEmails();
  validateCheckpatchPath();
  loadSettingsFromApi();

  ['ssl-verify-field', 'ca-bundle-field'].forEach(function (id) {
    if (!document.querySelector('[data-testid="' + id + '"]')) {
      console.error('AKDW SETTINGS BUG: ' + id + ' missing from DOM!');
    }
  });
})();
</script>
{% endblock %}
