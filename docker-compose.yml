version: "3.9"

services:
  akdw:
    container_name: akdw
    build: .
    ports:
      - "${AKDW_PORT:-5001}:${FLASK_PORT:-5000}"
    volumes:
      - /local/mnt/workspace/AUDIO_KERNEL_DEVELOPMENT_WORKBENCH(AKDW):/app/workspace:rw
      - /local/mnt/workspace/AUDIO_KERNEL_DEVELOPMENT_WORKBENCH(AKDW)/kernel:/app/kernel:rw
      - /local/mnt/workspace/AUDIO_KERNEL_DEVELOPMENT_WORKBENCH(AKDW)/sessions:/app/sessions:rw
      - /local/mnt/workspace/AUDIO_KERNEL_DEVELOPMENT_WORKBENCH(AKDW)/patches:/app/patches:rw
      - /local/mnt/workspace:/local/mnt/workspace:ro
      - ./certs:/app/certs:ro
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.ssh:/root/.ssh:ro
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${FLASK_PORT:-5000}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
