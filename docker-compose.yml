services:
  akdw:
    container_name: akdw
    build: .
    ports:
      - "${AKDW_PORT:-5001}:${FLASK_PORT:-5000}"
    volumes:
      - ${HOST_WORKSPACE_PATH:-.}:/app/workspace:rw
      - ${HOST_KERNEL_PATH:-./kernel}:/app/kernel:rw
      - ${HOST_SESSIONS_PATH:-./sessions}:/app/sessions:rw
      - ${HOST_PATCHES_PATH:-./patches}:/app/patches:rw
      - ${HOST_MNT_WORKSPACE_PATH:-/tmp}:/local/mnt/workspace:ro
      - ./certs:/app/certs:ro
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${FLASK_PORT:-5000}/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
