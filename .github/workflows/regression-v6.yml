name: AKDW Regression v6

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  regression-v6:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build and start AKDW
        run: |
          docker compose up -d --build akdw

      - name: Wait for health
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" http://localhost:5001/health || true)
            if [ "$code" = "200" ] && grep -q '"status": "ok"' /tmp/health.json; then
              echo "AKDW healthy"
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          echo "AKDW health check failed"
          docker compose logs --no-color akdw || true
          exit 1

      - name: Run v6 regression suite
        run: |
          python3 scripts/regression_v6.py \
            --base-url http://localhost:5001 \
            --out-json artifacts/regression_v6.json \
            --out-md artifacts/regression_v6.md

      - name: Upload regression artifacts
        uses: actions/upload-artifact@v4
        with:
          name: akdw-regression-v6
          path: artifacts/
          if-no-files-found: error

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --no-color akdw || true

      - name: Shutdown containers
        if: always()
        run: |
          docker compose down -v

