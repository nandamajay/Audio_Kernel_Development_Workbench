name: AKDW Regression v6

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  regression-v6:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Resolve Docker Compose CLI
        run: |
          set -e
          COMPOSE_CMD=""
          if docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD="docker compose"
          elif docker-compose version >/dev/null 2>&1; then
            COMPOSE_CMD="docker-compose"
          else
            sudo apt-get update
            sudo apt-get install -y docker-compose-plugin || sudo apt-get install -y docker-compose
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Unable to locate docker compose CLI"
              exit 1
            fi
          fi
          echo "COMPOSE_CMD=$COMPOSE_CMD" >> "$GITHUB_ENV"
          echo "Using compose command: $COMPOSE_CMD"
          docker version
          $COMPOSE_CMD version

      - name: Prepare CI Workspace Env
        run: |
          set -e
          mkdir -p kernel sessions patches certs
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          set_kv() {
            key="$1"
            val="$2"
            if grep -q "^${key}=" .env; then
              sed -i "s|^${key}=.*|${key}=${val}|" .env
            else
              echo "${key}=${val}" >> .env
            fi
          }
          set_kv "HOST_WORKSPACE_PATH" "${GITHUB_WORKSPACE}"
          set_kv "HOST_KERNEL_PATH" "${GITHUB_WORKSPACE}/kernel"
          set_kv "HOST_SESSIONS_PATH" "${GITHUB_WORKSPACE}/sessions"
          set_kv "HOST_PATCHES_PATH" "${GITHUB_WORKSPACE}/patches"
          set_kv "HOST_MNT_WORKSPACE_PATH" "/tmp"
          set_kv "QGENIE_API_KEY" "ci-regression-key"
          echo "CI .env prepared:"
          grep -E "^(HOST_WORKSPACE_PATH|HOST_KERNEL_PATH|HOST_SESSIONS_PATH|HOST_PATCHES_PATH|HOST_MNT_WORKSPACE_PATH|QGENIE_API_KEY)=" .env

      - name: Build and start AKDW
        run: |
          ${COMPOSE_CMD} build \
            --build-arg REQUIREMENTS_FILE=requirements-ci.txt \
            --build-arg PIP_EXTRA_INDEX_URL= \
            akdw
          ${COMPOSE_CMD} up -d akdw

      - name: Wait for health
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" http://localhost:5001/health || true)
            if [ "$code" = "200" ] && python3 - <<'PY'
import json
import sys
try:
    with open("/tmp/health.json", "r", encoding="utf-8") as f:
        data = json.load(f)
except Exception:
    sys.exit(1)
sys.exit(0 if data.get("status") == "ok" else 1)
PY
            then
              echo "AKDW healthy"
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          echo "AKDW health check failed"
          ${COMPOSE_CMD} logs --no-color akdw || true
          exit 1

      - name: Run v6 regression suite
        run: |
          python3 scripts/regression_v6.py \
            --base-url http://localhost:5001 \
            --out-json artifacts/regression_v6.json \
            --out-md artifacts/regression_v6.md

      - name: Upload regression artifacts
        uses: actions/upload-artifact@v4
        with:
          name: akdw-regression-v6
          path: artifacts/
          if-no-files-found: error

      - name: Dump logs on failure
        if: failure()
        run: |
          ${COMPOSE_CMD} ps || true
          ${COMPOSE_CMD} logs --no-color akdw || true

      - name: Shutdown containers
        if: always()
        run: |
          ${COMPOSE_CMD} down -v || true
